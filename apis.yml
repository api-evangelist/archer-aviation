aid: archer-aviation
name: Archer Aviation
description: >-
  Archer Aviation is a U.S. eVTOL aircraft company developing Midnight, a piloted
  four-passenger all-electric aircraft designed for rapid back-to-back urban
  flights of roughly 20-50 miles with a ~10 minute charge between trips. Archer
  is pursuing FAA Type Certification and operates through commercial and defense
  business lines. Key partnerships include Stellantis (contract manufacturing
  at Archer's Covington, Georgia facility), United Airlines (launch routes
  including the Manhattan-Newark corridor), and a Launch Edition program in
  the United Arab Emirates with Abu Dhabi Aviation. Archer also has a dedicated
  defense division (Archer Defense) developing hybrid VTOL platforms with
  Anduril and supporting U.S. government missions. The company trades on the
  NYSE under ACHR.
